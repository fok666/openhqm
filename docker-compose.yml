services:
  redis:
    image: redis:7-alpine
    container_name: openhqm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - openhqm

  # Stand-in for "your app" — the backend the worker forwards to.
  backend:
    image: kennethreitz/httpbin
    container_name: openhqm-backend
    networks:
      - openhqm

  # Mode 1: HTTP → Queue
  ingress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openhqm-ingress
    ports:
      - "8000:8000"
    environment:
      - OPENHQM_QUEUE__REDIS_URL=redis://redis:6379
      - OPENHQM_CACHE__REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: python -m openhqm http-to-queue
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - openhqm
    restart: unless-stopped

  # Mode 2: Queue → HTTP (forwards to the backend)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OPENHQM_QUEUE__REDIS_URL=redis://redis:6379
      - OPENHQM_CACHE__REDIS_URL=redis://redis:6379
      - OPENHQM_PROXY__BACKEND_URL=http://backend/post
    depends_on:
      redis:
        condition: service_healthy
    command: python -m openhqm queue-to-http worker-${WORKER_ID:-1}
    deploy:
      replicas: 3
    networks:
      - openhqm
    restart: unless-stopped

networks:
  openhqm:
    driver: bridge

volumes:
  redis_data:
